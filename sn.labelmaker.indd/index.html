<!DOCTYPE html>
<html>

<head>
</head>
<style>
  html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
  }
  .panelRoot {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 12px;
    box-sizing: border-box;
    min-height: 0;
  }
  p {
    color: white;
    margin: 0;
  }
  .manageActions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .columnVisibilityGroup {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 8px;
    border: 1px solid #4a4a4a;
    border-radius: 4px;
  }
  .columnVisibilityGroup label {
    color: white;
    font-size: 12px;
  }
  .labelsPanel {
    min-height: 0;
  }
  .tableWrap {
    border: 1px solid #4a4a4a;
    border-radius: 4px;
    overflow: auto;
    flex: 1 1 auto;
    min-height: 0;
    min-width: 0;
  }
  table {
    width: max-content;
    min-width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 12px;
    color: white;
  }
  th, td {
    padding: 6px 8px;
    text-align: left;
    border-bottom: 1px solid #333333;
    vertical-align: top;
  }
  th {
    background: #2b2b2b;
    font-weight: 600;
    position: static;
  }
  .layoutStyleMatch {
    background: #1f5f3b;
  }
  tbody tr:last-child td {
    border-bottom: none;
  }
  .emptyState {
    color: #c9c9c9;
    padding: 10px 8px;
  }
</style>

<body>
  <script src="main.js"></script>
</body>
</html>
